<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#070605"/>
      <stop offset="1" stop-color="#191410"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.08"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect x="240" y="180" width="720" height="22" rx="11" fill="#2b2218"/>
  <rect x="540" y="202" width="50" height="320" fill="#0e0b08"/>
  <rect x="610" y="202" width="50" height="320" fill="#0e0b08"/>
  <circle cx="600" cy="600" r="120" fill="#0b0908"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity="0.6"/>
</svg>
