<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.55" stop-color="#141210"/>
      <stop offset="1" stop-color="#1f1812"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.68" cy="0.38" r="0.5">
      <stop offset="0" stop-color="#d45c00" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#d45c00" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.07"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <ellipse cx="1080" cy="610" rx="190" ry="330" fill="#0a0908"/>
  <ellipse cx="1080" cy="300" rx="80" ry="85" fill="#0d0b09"/>
  <rect x="860" y="540" width="440" height="14" rx="7" fill="#241d15"/>
  <circle cx="880" cy="547" r="46" fill="#181310"/>
  <circle cx="1280" cy="547" r="46" fill="#181310"/>
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.6"/>
  <text x="64" y="840" font-family="Arial Black, sans-serif" font-size="26" letter-spacing="14" fill="#3a3128">CRAZYWORK — 5:47AM CLUB</text>
</svg>
